  LAYOVER:
    label: layover-preflight
    home: lanes/20260709_layover-preflight/
    waves: [LAYOVER-W1, LAYOVER-W2, LAYOVER-INT, LAYOVER-ACCEPT]
    status: completed   # W1+W2+INT+ACCEPT all landed; real report at wavves/layovers/curl-20260709.md, see gate-captures/LAYOVER-ACCEPT.md
    note: >-
      Build /layover, a new wavves leaf skill that reads a .code-workspace
      file (or folder list) for a bespoke desktop multi-repo workspace and
      produces a read-only preflight audit of every sibling repo: remotes,
      sync state vs origin, untracked files, uncommitted changes and stashes.
      Root cause: a Cursor cloud agent attaches per-repo to a pushed remote
      and cannot open a local multi-root workspace, so nothing today tells
      the operator what local-only state (measured on the real curl.code-
      workspace at design time: 101/17/56/131 untracked files across pax,
      aimez, MAT761, PHY600) a cloud agent would miss on takeover. Audit-only
      end state; no staging, hydration-file writes or handoff mechanics in
      this lane. Wave split: W1 nails exact git command set + SKILL.md
      insertion format (discovery, read-only), W2 writes the new skill,
      playbook and layovers/README as brand-new files (build), INT adds two
      rows to the shared skills/wavves/SKILL.md router (single serialized
      editor, GATED per house skill-file-edit rule), ACCEPT runs /layover for
      real against curl.code-workspace and verifies zero mutation plus
      correct grouped output (GATED, independent evaluator).
  SELF:
    label: wavves-self-improvement
    home: lanes/20260709_wavves-self-improvement/
    waves: [SELF-W1, SELF-W2, SELF-W3, SELF-INT, SELF-ACCEPT]
    status: completed   # W1+W2+INT+ACCEPT all landed; regression genuinely seeded and caught, see gate-captures/SELF-ACCEPT.md
    note: >-
      Build the eval-fixture, repeated-trial verification and failure-log
      self-audit loop that lets wavves' own skills (mod-check, charter)
      compound improvements from real lane outcomes instead of staying
      static. Root cause: skill-edit proposals currently promote from
      skills/proposed/ to skills/accepted/ on operator review alone, with no
      regression check against known failure modes and no requirement that a
      fix reproduce before being trusted. Wave split: W1 builds the fixture
      corpus (discovery, read-only against existing skill files), W2 wires
      the 3x repeated-trial verification harness plus failure-log schema
      (build, new files), INT wires both into charter's skill-proposal
      section and mod-check's promotion path (single serialized editor,
      GATED), ACCEPT runs the fixture corpus end to end and confirms a
      seeded regression is caught (GATED, independent evaluator).
